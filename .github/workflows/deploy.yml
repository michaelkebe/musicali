name: Deploy Vite app to GitHub Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: |
          PKG=$(node -p "require('./package.json').version")
          LOCK=$(node -p "require('./package-lock.json').version")
          [ "$PKG" = "$LOCK" ] || { echo "Version mismatch: $PKG != $LOCK"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed version
        run: |
          sleep 10
          curl -sL "${{ steps.deployment.outputs.page_url }}" | grep -q "v${{ needs.build.outputs.version }}" \
            || { echo "Deploy verification failed — page does not show v${{ needs.build.outputs.version }}"; exit 1; }
